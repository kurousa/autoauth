name: Build AutoAuth App

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: true

      - name: Download dependencies
        run: go mod download

      # ==========================================
      # 1. コンソール版（黒い画面が出る・テスト用）のビルド
      # ==========================================
      - name: Build for Windows (Console Mode)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -o autoauth.exe main.go

      # ==========================================
      # 2. 常駐版（バックグラウンドで動く・本番用）のビルド
      # ==========================================
      - name: Build for Windows (Background Mode)
        env:
          GOOS: windows
          GOARCH: amd64
        run: go build -ldflags="-H windowsgui" -o autoauth_bg.exe main.go

      # ==========================================
      # 3. ビルドした.exeファイルを成果物として保存
      # ==========================================
      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AutoAuth-Windows-Builds
          path: |
            autoauth.exe
            autoauth_bg.exe
          retention-days: 7
